services:
  mongodb:
    image: mongo:7
    container_name: quiz-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: quiz-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: quiz-frontend
    ports:
      - "3000:3000"
    environment:
      # Browser should reach the backend via host port mapping
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  mongo_data: